[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"
base = "${BASE_RPC_URL}"
xrpl_evm_testnet = "https://rpc.testnet.xrplevm.org"
xrpl_evm_mainnet = "https://rpc.xrplevm.org"

[fmt]
line_length = 120
